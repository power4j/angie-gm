server {
    listen 38080;
    server_name demo.example.com;

    root /opt/angie/share/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}

server {
    listen 38443 ssl;
    server_name demo.example.com;

    root /opt/angie/share/html;
    index index.html;

    ssl_ntls on;
    ssl_password_file /etc/angie/ssl-cert/sm2/password.txt;

    ssl_certificate /etc/angie/ssl-cert/sm2/sm2.demo.example.com.sig.crt.pem
                    /etc/angie/ssl-cert/sm2/sm2.demo.example.com.enc.crt.pem;
    ssl_certificate_key /etc/angie/ssl-cert/sm2/sm2.demo.example.com.sig.key.pem
                        /etc/angie/ssl-cert/sm2/sm2.demo.example.com.enc.key.pem;

    ssl_certificate /etc/angie/ssl-cert/rsa/demo.example.com.crt;
    ssl_certificate_key /etc/angie/ssl-cert/rsa/demo.example.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECC-SM2-SM4-CBC-SM3:ECDHE-SM2-WITH-SM4-SM3:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-SHA:AES128-GCM-SHA256:AES128-SHA256:AES128-SHA;
    ssl_prefer_server_ciphers on;

    location / {
        try_files $uri $uri/ =404;
    }
}
