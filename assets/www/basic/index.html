<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome to Angie</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f4f7f8;
            --panel: #ffffff;
            --text: #16333a;
            --muted: #56737a;
            --accent: #0f766e;
            --border: #d8e3e6;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, #dff4ef 0, transparent 45%),
                linear-gradient(180deg, #f8fbfc 0%, var(--bg) 100%);
            color: var(--text);
            font-family: "Segoe UI", "Noto Sans", sans-serif;
        }

        main {
            width: min(680px, 100%);
            padding: 40px 32px;
            border: 1px solid var(--border);
            border-radius: 20px;
            background: color-mix(in srgb, var(--panel) 92%, white 8%);
            box-shadow: 0 20px 60px rgba(22, 51, 58, 0.08);
        }

        h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.7;
            color: var(--muted);
        }

        strong {
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main>
        <h1>Welcome to Angie</h1>
        <p>This page confirms that <strong>angie-gm</strong> is installed and running.</p>
    </main>
</body>
</html>
